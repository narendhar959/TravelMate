<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelMate - Profile</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, white 0%, white 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .header {
        background: #008080;
        color: white;
        padding: 20px;
        text-align: center;
        position: relative;
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 30px;
      }

      .profile-sidebar {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }

      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: green;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 48px;
        color: white;
        font-weight: bold;
      }

      .profile-name {
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }

      .profile-email {
        text-align: center;
        color: #666;
        margin-bottom: 20px;
      }

      .profile-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 20px;
      }

      .stat-item {
        text-align: center;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .stat-number {
        font-size: 24px;
        font-weight: bold;
        color: #008080;
      }

      .stat-label {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }

      .profile-main {
        display: flex;
        flex-direction: column;
        gap: 25px;
      }

      .profile-section {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .section-title {
        color: #008080;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #008080;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .save-btn {
        background: #008080;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        margin-top: 20px;
      }

      .save-btn:hover {
        background: #006666;
      }

      .booking-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border: 1px solid #eee;
        border-radius: 10px;
        margin-bottom: 15px;
        transition: all 0.3s;
      }

      .booking-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .booking-info h4 {
        margin: 0 0 5px 0;
        color: #008080;
      }

      .booking-info p {
        margin: 0;
        color: #666;
        font-size: 14px;
      }

      .booking-status {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }

      .status-confirmed {
        background: #e8f5e8;
        color: #2e7d32;
      }

      .status-pending {
        background: #fff3e0;
        color: #f57c00;
      }

      .preferences-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .preference-item {
        padding: 20px;
        border: 2px solid #f0f0f0;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
      }

      .preference-item:hover {
        border-color: #008080;
      }

      .preference-item.selected {
        border-color: #008080;
        background: #f0fdfd;
      }
      .preference-label {
        font-weight: bold;
        color: #333;
      }

      .emergency-contact {
        background: #fff3cd;
        border: 1px solid #ffeaa7;
        border-radius: 10px;
        padding: 20px;
        margin-top: 20px;
      }

      .emergency-contact h4 {
        color: #856404;
        margin-top: 0;
      }

      .logout-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 20px;
        width: 100%;
      }

      .logout-btn:hover {
        background: #c82333;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .preferences-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="main.html" class="back-btn">← Back</a>
      <h1>My Profile</h1>
      <p>Manage your account and travel preferences</p>
    </div>

    <div class="container">
      <div class="profile-sidebar">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-email" id="profileEmail">Loading...</div>

        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-number" id="totalBookings">0</div>
            <div class="stat-label">Total Bookings</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="totalSpent">₹0</div>
            <div class="stat-label">Total Spent</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="tripsCompleted">0</div>
            <div class="stat-label">Trips Completed</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="memberSince">2025</div>
            <div class="stat-label">Member Since</div>
          </div>
        </div>

        <button class="logout-btn" href="getstart.html">Logout</button>
      </div>

      <div class="profile-main">
        <div class="profile-section">
          <div class="section-title">Personal Information</div>
          <form id="personalInfoForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required />
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required />
              </div>
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required />
              </div>
              <div class="form-group">
                <label for="dateOfBirth">Date of Birth</label>
                <input type="date" id="dateOfBirth" required />
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                  <option value="prefer-not-to-say">Prefer not to say</option>
                </select>
              </div>
              <div class="form-group">
                <label for="nationality">Nationality</label>
                <input
                  type="text"
                  id="nationality"
                  placeholder="e.g., Indian"
                />
              </div>
              <div class="form-group">
                <label for="passportNumber">Passport Number</label>
                <input type="text" id="passportNumber" placeholder="Optional" />
              </div>
            </div>
            <button type="submit" class="save-btn">
              Save Personal Information
            </button>
          </form>
        </div>

        <div class="profile-section">
          <div class="section-title">Address Information</div>
          <form id="addressForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="address">Street Address</label>
                <input
                  type="text"
                  id="address"
                  placeholder="Enter your address"
                />
              </div>
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" required />
              </div>
              <div class="form-group">
                <label for="state">State/Province</label>
                <input type="text" id="state" required />
              </div>
              <div class="form-group">
                <label for="zipCode">ZIP/Postal Code</label>
                <input type="text" id="zipCode" required />
              </div>
              <div class="form-group">
                <label for="country">Country</label>
                <select id="country" required>
                  <option value="">Select Country</option>
                  <option value="india">India</option>
                  <option value="usa">United States</option>
                  <option value="uk">United Kingdom</option>
                  <option value="canada">Canada</option>
                  <option value="australia">Australia</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <button type="submit" class="save-btn">Save Address</button>
          </form>
        </div>

        <!-- Travel Preferences -->
        <div class="profile-section">
          <div class="section-title">Travel Preferences</div>
          <div class="preferences-grid">
            <div
              class="preference-item"
              onclick="togglePreference(this, 'adventure')"
            >
              <div class="preference-label">Adventure</div>
            </div>
            <div
              class="preference-item"
              onclick="togglePreference(this, 'beach')"
            >
              <div class="preference-label">Beach</div>
            </div>
            <div
              class="preference-item"
              onclick="togglePreference(this, 'culture')"
            >
              <div class="preference-label">Culture</div>
            </div>
            <div
              class="preference-item"
              onclick="togglePreference(this, 'nature')"
            >
              <div class="preference-label">Nature</div>
            </div>
            <div
              class="preference-item"
              onclick="togglePreference(this, 'luxury')"
            >
              <div class="preference-label">Luxury</div>
            </div>
            <div
              class="preference-item"
              onclick="togglePreference(this, 'budget')"
            >
              <div class="preference-label">Budget</div>
            </div>
          </div>

          <div class="form-grid" style="margin-top: 25px">
            <div class="form-group">
              <label for="preferredAirline">Preferred Airline</label>
              <select id="preferredAirline">
                <option value="">No preference</option>
                <option value="indigo">IndiGo</option>
                <option value="air-india">Air India</option>
                <option value="spicejet">SpiceJet</option>
                <option value="vistara">Vistara</option>
                <option value="go-air">GoAir</option>
              </select>
            </div>
            <div class="form-group">
              <label for="seatPreference">Seat Preference</label>
              <select id="seatPreference">
                <option value="">No preference</option>
                <option value="window">Window</option>
                <option value="aisle">Aisle</option>
                <option value="middle">Middle</option>
              </select>
            </div>
            <div class="form-group">
              <label for="mealPreference">Meal Preference</label>
              <select id="mealPreference">
                <option value="">No preference</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="vegan">Vegan</option>
                <option value="non-vegetarian">Non-Vegetarian</option>
                <option value="jain">Jain</option>
              </select>
            </div>
            <div class="form-group">
              <label for="budgetRange">Budget Range (per trip)</label>
              <select id="budgetRange">
                <option value="">No preference</option>
                <option value="budget">Budget (₹5,000 - ₹15,000)</option>
                <option value="mid">Mid-range (₹15,000 - ₹50,000)</option>
                <option value="luxury">Luxury (₹50,000+)</option>
              </select>
            </div>
          </div>
          <button class="save-btn" onclick="savePreferences()">
            Save Preferences
          </button>
        </div>

        <div class="profile-section">
          <div class="section-title">Emergency Contact</div>
          <form id="emergencyForm">
            <div class="form-grid">
              <div class="form-group">
                <label for="emergencyName">Contact Name</label>
                <input type="text" id="emergencyName" placeholder="Full name" />
              </div>
              <div class="form-group">
                <label for="emergencyRelation">Relationship</label>
                <select id="emergencyRelation">
                  <option value="">Select relationship</option>
                  <option value="spouse">Spouse</option>
                  <option value="parent">Parent</option>
                  <option value="sibling">Sibling</option>
                  <option value="child">Child</option>
                  <option value="friend">Friend</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="emergencyPhone">Phone Number</label>
                <input
                  type="tel"
                  id="emergencyPhone"
                  placeholder="Emergency contact number"
                />
              </div>
              <div class="form-group">
                <label for="emergencyEmail">Email Address</label>
                <input
                  type="email"
                  id="emergencyEmail"
                  placeholder="Emergency contact email"
                />
              </div>
            </div>
            <button type="submit" class="save-btn">
              Save Emergency Contact
            </button>
          </form>
        </div>

        <div class="profile-section">
          <div class="section-title">Recent Bookings</div>
          <div id="recentBookings"></div>
        </div>
      </div>
    </div>

    <script src="/js/alert-modal.js"></script>
    <script>
      let userPreferences = [];

      function loadUserProfile() {
        const user = JSON.parse(
          localStorage.getItem("user") || "null"
        );

        if (!user) {
          showAlertModal("Please login to access your profile", "error");
          window.location.href = "login.html";
          return;
        }

        document.getElementById("profileName").textContent =
          user.fullname || `${user.firstname} ${user.lastname}`;
        document.getElementById("profileEmail").textContent = user.email;

        const initials =
          (user.firstname?.[0] || "") + (user.lastname?.[0] || "");
        document.getElementById("profileAvatar").textContent =
          initials.toUpperCase();
        document.getElementById("firstName").value = user.firstname || "";
        document.getElementById("lastName").value = user.lastname || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("phone").value = user.phone || "";
        document.getElementById("dateOfBirth").value = user.dob || "";
        document.getElementById("gender").value = user.gender || "";
        document.getElementById("city").value = user.city || "";

        const extendedProfile = JSON.parse(
          localStorage.getItem(`travelmate_profile_${user.id}`) || "{}"
        );

        document.getElementById("nationality").value =
          extendedProfile.nationality || "";
        document.getElementById("passportNumber").value =
          extendedProfile.passportNumber || "";
        document.getElementById("address").value =
          extendedProfile.address || "";
        document.getElementById("state").value = extendedProfile.state || "";
        document.getElementById("zipCode").value =
          extendedProfile.zipCode || "";
        document.getElementById("country").value =
          extendedProfile.country || "";

        document.getElementById("preferredAirline").value =
          extendedProfile.preferredAirline || "";
        document.getElementById("seatPreference").value =
          extendedProfile.seatPreference || "";
        document.getElementById("mealPreference").value =
          extendedProfile.mealPreference || "";
        document.getElementById("budgetRange").value =
          extendedProfile.budgetRange || "";

        document.getElementById("emergencyName").value =
          extendedProfile.emergencyName || "";
        document.getElementById("emergencyRelation").value =
          extendedProfile.emergencyRelation || "";
        document.getElementById("emergencyPhone").value =
          extendedProfile.emergencyPhone || "";
        document.getElementById("emergencyEmail").value =
          extendedProfile.emergencyEmail || "";

        userPreferences = extendedProfile.travelPreferences || [];
        userPreferences.forEach((pref) => {
          const element = document.querySelector(`[onclick*="${pref}"]`);
          if (element) element.classList.add("selected");
        });

        loadUserStats(user.id);
        loadRecentBookings(user.id);

        const memberSince = new Date(
          user.createdAt || Date.now()
        ).getFullYear();
        document.getElementById("memberSince").textContent = memberSince;
      }

      function loadUserStats(userId) {
        const bookings = JSON.parse(
          localStorage.getItem("travelmate_bookings") || "[]"
        );
        const userBookings = bookings.filter(
          (booking) => booking.userId === userId
        );

        document.getElementById("totalBookings").textContent =
          userBookings.length;

        const totalSpent = userBookings.reduce((sum, booking) => {
          const price = parseInt(booking.price.replace(/[₹,]/g, "")) || 0;
          return sum + price;
        }, 0);
        document.getElementById(
          "totalSpent"
        ).textContent = `₹${totalSpent.toLocaleString()}`;

        const completedTrips = userBookings.filter(
          (booking) => booking.status === "confirmed"
        ).length;
        document.getElementById("tripsCompleted").textContent = completedTrips;
      }

      function loadRecentBookings(userId) {
        const bookings = JSON.parse(
          localStorage.getItem("travelmate_bookings") || "[]"
        );
        const userBookings = bookings
          .filter((booking) => booking.userId === userId)
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, 5);

        const container = document.getElementById("recentBookings");

        if (userBookings.length === 0) {
          container.innerHTML =
            '<p style="text-align: center; color: #666;">No bookings found</p>';
          return;
        }

        container.innerHTML = "";
        userBookings.forEach((booking) => {
          const bookingItem = document.createElement("div");
          bookingItem.className = "booking-item";
          bookingItem.innerHTML = `
          <div class="booking-info">
            <h4>${booking.title}</h4>
            <p><strong>Type:</strong> ${
              booking.type.charAt(0).toUpperCase() + booking.type.slice(1)
            } | 
               <strong>Price:</strong> ${booking.price} | 
               <strong>ID:</strong> ${booking.id}</p>
            <p><strong>Date:</strong> ${new Date(
              booking.date
            ).toLocaleDateString()}</p>
          </div>
          <div class="booking-status status-${booking.status}">
            ${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
          </div>
        `;
          container.appendChild(bookingItem);
        });
      }

      function togglePreference(element, preference) {
        element.classList.toggle("selected");

        if (userPreferences.includes(preference)) {
          userPreferences = userPreferences.filter((p) => p !== preference);
        } else {
          userPreferences.push(preference);
        }
      }

      function savePreferences() {
        const user = JSON.parse(
          localStorage.getItem("user")
        );
        const extendedProfile = JSON.parse(
          localStorage.getItem(`travelmate_profile_${user.id}`) || "{}"
        );

        extendedProfile.travelPreferences = userPreferences;
        extendedProfile.preferredAirline =
          document.getElementById("preferredAirline").value;
        extendedProfile.seatPreference =
          document.getElementById("seatPreference").value;
        extendedProfile.mealPreference =
          document.getElementById("mealPreference").value;
        extendedProfile.budgetRange =
          document.getElementById("budgetRange").value;

        localStorage.setItem(
          `travelmate_profile_${user.id}`,
          JSON.stringify(extendedProfile)
        );

        showAlertModal("Travel preferences saved successfully!", "success");
      }

      document
        .getElementById("personalInfoForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = JSON.parse(
            localStorage.getItem("user")
          );
          const users = JSON.parse(
            localStorage.getItem("travelmate_users") || "[]"
          );
          const updatedUser = {
            ...user,
            firstname: document.getElementById("firstName").value,
            lastname: document.getElementById("lastName").value,
            fullname: `${document.getElementById("firstName").value} ${
              document.getElementById("lastName").value
            }`,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            dob: document.getElementById("dateOfBirth").value,
            gender: document.getElementById("gender").value,
            city: document.getElementById("city").value,
          };

          const userIndex = users.findIndex((u) => u.id === user.id);
          if (userIndex !== -1) {
            users[userIndex] = updatedUser;
            localStorage.setItem("travelmate_users", JSON.stringify(users));
          }

          localStorage.setItem(
            "user",
            JSON.stringify(updatedUser)
          );

          const extendedProfile = JSON.parse(
            localStorage.getItem(`travelmate_profile_${user.id}`) || "{}"
          );
          extendedProfile.nationality =
            document.getElementById("nationality").value;
          extendedProfile.passportNumber =
            document.getElementById("passportNumber").value;
          localStorage.setItem(
            `travelmate_profile_${user.id}`,
            JSON.stringify(extendedProfile)
          );

          showAlertModal("Personal information updated successfully!", "success");
          loadUserProfile();
        });

      document
        .getElementById("addressForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = JSON.parse(
            localStorage.getItem("user")
          );
          const extendedProfile = JSON.parse(
            localStorage.getItem(`travelmate_profile_${user.id}`) || "{}"
          );

          extendedProfile.address = document.getElementById("address").value;
          extendedProfile.state = document.getElementById("state").value;
          extendedProfile.zipCode = document.getElementById("zipCode").value;
          extendedProfile.country = document.getElementById("country").value;

          localStorage.setItem(
            `travelmate_profile_${user.id}`,
            JSON.stringify(extendedProfile)
          );

          showAlertModal("Address information saved successfully!", "success");
        });

      document
        .getElementById("emergencyForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = JSON.parse(
            localStorage.getItem("user")
          );
          const extendedProfile = JSON.parse(
            localStorage.getItem(`travelmate_profile_${user.id}`) || "{}"
          );

          extendedProfile.emergencyName =
            document.getElementById("emergencyName").value;
          extendedProfile.emergencyRelation =
            document.getElementById("emergencyRelation").value;
          extendedProfile.emergencyPhone =
            document.getElementById("emergencyPhone").value;
          extendedProfile.emergencyEmail =
            document.getElementById("emergencyEmail").value;

          localStorage.setItem(
            `travelmate_profile_${user.id}`,
            JSON.stringify(extendedProfile)
          );

          showAlertModal(
            "Emergency contact information saved successfully!",
            "success"
          );
        });

      function logout() {
        if (confirm("Are you sure you want to logout?")) {
          localStorage.removeItem("user");
          window.location.href = "login.html";
        }
      }
      document.addEventListener("DOMContentLoaded", function () {
        loadUserProfile();
      });
    </script>
    <script src="/js/profile-sync.js"></script>
  </body>
</html>
